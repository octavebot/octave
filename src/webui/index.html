<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Octave Control Panel</title>
<style>
  :root {
    --bg: #0b0e14;
    --bg-elev: #131720;
    --bg-card: #1a1f2c;
    --border: #232a3a;
    --text: #e7eaf3;
    --text-dim: #8b94aa;
    --text-faint: #5b667d;
    --accent: #ffd23f;
    --accent-soft: #4a3e10;
    --green: #2ecc71;
    --red: #ff5c6c;
    --orange: #ffa726;
    --blue: #3b82f6;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body {
    background-image: radial-gradient(circle at 20% 0%, #1c2438 0%, var(--bg) 50%);
    padding: 24px;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
  }
  header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 28px;
  }
  .logo {
    width: 56px; height: 56px;
    background: radial-gradient(circle, var(--accent) 0%, #cf9e2e 100%);
    border-radius: 50%;
    display: grid; place-items: center;
    color: #1a1a1a;
    font-weight: 700; font-size: 28px;
    box-shadow: 0 0 20px rgba(255,210,63,0.4);
  }
  .logo-img {
    width: 56px; height: 56px;
    border-radius: 12px;
    object-fit: contain;
    background: transparent;
  }
  h1 {
    font-size: 28px; margin: 0; letter-spacing: -0.02em;
  }
  .subtitle {
    color: var(--text-dim); font-size: 13px; margin-top: 4px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin: 0 0 16px;
    font-weight: 600;
  }
  /* Mode segmented control */
  .segmented {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    background: var(--bg-elev);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }
  .segmented button {
    background: transparent;
    border: 0;
    color: var(--text-dim);
    padding: 12px 8px;
    border-radius: 7px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 120ms, color 120ms;
  }
  .segmented button:hover { color: var(--text); }
  .segmented button.active {
    background: var(--accent);
    color: #1a1a1a;
    font-weight: 700;
  }
  .seg-desc {
    color: var(--text-faint); font-size: 12px;
    margin-top: 8px; padding: 0 4px;
  }
  /* Status grid */
  .status-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .stat {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .stat .label {
    color: var(--text-faint);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .stat .value {
    font-size: 15px;
    font-weight: 600;
  }
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot.green  { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.orange { background: var(--orange); }
  .dot.red    { background: var(--red); }
  .dot.gray   { background: var(--text-faint); }

  /* Strategy toggles */
  .strategy {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 4px;
    border-bottom: 1px solid var(--border);
  }
  .strategy:last-child { border-bottom: 0; }
  .strategy .info { flex: 1; }
  .strategy .name {
    font-size: 15px; font-weight: 600;
  }
  .strategy .desc {
    font-size: 12px; color: var(--text-faint); margin-top: 2px;
  }
  .strategy .num {
    display: inline-block;
    background: var(--bg-elev);
    color: var(--accent);
    font-size: 11px; font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
    margin-right: 10px;
    border: 1px solid var(--border);
  }
  /* Toggle switch */
  .toggle {
    position: relative;
    width: 50px; height: 28px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: background 180ms;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 22px; height: 22px;
    background: var(--text-faint);
    border-radius: 50%;
    transition: transform 180ms, background 180ms;
  }
  .toggle.on {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .toggle.on::after {
    transform: translateX(22px);
    background: var(--accent);
    box-shadow: 0 0 8px rgba(255,210,63,0.6);
  }
  .toggle.saving { opacity: 0.5; pointer-events: none; }

  /* Strategy folders */
  .folder {
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
    background: var(--bg-elev);
  }
  .folder-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
  }
  .folder.collapsed .folder-header { border-bottom: 0; }
  .folder-header:hover { background: var(--bg-elev); }
  .folder-title { font-size: 13px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; color: var(--text); }
  .folder-meta  { font-size: 11px; color: var(--text-faint); }
  .folder-caret { color: var(--text-faint); margin-left: 8px; transition: transform 180ms; }
  .folder.collapsed .folder-caret { transform: rotate(-90deg); }
  .folder-body { padding: 4px 14px; }
  .folder.collapsed .folder-body { display: none; }

  /* Custom strategy actions */
  .strategy-row-actions { display: flex; gap: 6px; margin-right: 8px; }
  .icon-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-faint);
    padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--text-faint); }
  .icon-btn.danger:hover { color: var(--red); border-color: rgba(255,92,108,0.4); }

  /* Strategy editor modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; min-width: 320px; max-width: 92vw; max-height: 88vh; overflow-y: auto;
  }
  .modal h3 { margin: 0 0 16px; font-size: 16px; }
  .modal label { display: block; font-size: 11px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.4px; margin: 12px 0 4px; }
  .modal input, .modal select, .modal textarea {
    width: 100%; box-sizing: border-box;
    background: var(--bg-elev); border: 1px solid var(--border); color: var(--text);
    padding: 8px 10px; border-radius: 6px; font-family: inherit; font-size: 13px;
  }
  .modal textarea { min-height: 60px; resize: vertical; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }

  /* Action buttons row */
  .actions {
    display: flex; gap: 10px; margin-top: 8px;
  }
  .btn {
    flex: 1;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 120ms, border-color 120ms;
  }
  .btn:hover { background: var(--bg-card); border-color: var(--text-faint); }
  .btn.danger { color: var(--red); border-color: rgba(255,92,108,0.3); }
  .btn.danger:hover { background: rgba(255,92,108,0.1); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 200ms, transform 200ms;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -8px); }

  footer {
    text-align: center; color: var(--text-faint); font-size: 11px;
    margin-top: 24px;
  }
  a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img class="logo-img" alt="Octave" src="/api/icon" onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='grid'">
    <div id="logo-fallback" class="logo" style="display:none">🎵</div>
    <div>
      <h1>Octave</h1>
      <div class="subtitle">Autonomous gold trading bot · running 24/7 on cloud VPS</div>
    </div>
  </header>

  <!-- HEADLINE STATUS -->
  <div class="card">
    <div id="headline" style="font-size:18px;font-weight:600;">Loading…</div>
    <div id="sub-headline" style="color:var(--text-dim);font-size:13px;margin-top:6px;">—</div>
  </div>

  <!-- ACTIVITY -->
  <div class="card">
    <h2>Activity</h2>
    <div class="status-grid">
      <div class="stat">
        <div class="label">Current Session</div>
        <div class="value" id="session-status">—</div>
      </div>
      <div class="stat">
        <div class="label">Last Alert</div>
        <div class="value" id="last-alert">—</div>
      </div>
      <div class="stat">
        <div class="label">MGC1! Gold</div>
        <div class="value" id="gold-price">—</div>
      </div>
      <div class="stat">
        <div class="label">MNQ1! Nasdaq</div>
        <div class="value" id="nasdaq-price">—</div>
      </div>
      <div class="stat">
        <div class="label">MES1! S&amp;P</div>
        <div class="value" id="sp-price">—</div>
      </div>
      <div class="stat">
        <div class="label">Open Positions</div>
        <div class="value" id="active-setups">—</div>
      </div>
    </div>
  </div>

  <!-- EVAL ACCOUNTS -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:baseline;">
      <h2 style="margin:0;">Eval Accounts</h2>
      <a href="/positions" target="_blank" style="color:var(--text-dim);font-size:12px;text-decoration:none;">Trade Panel ↗</a>
    </div>
    <div id="accounts" style="margin-top:12px;"></div>
  </div>

  <!-- SERVICES -->
  <div class="card">
    <h2>Services</h2>
    <div id="services"></div>
    <div class="actions" style="margin-top:14px;">
      <button class="btn" onclick="restartService('all')">🔄 Restart All</button>
    </div>
  </div>

  <!-- STRATEGIES -->
  <div class="card">
    <h2>Strategies</h2>
    <div id="strategies"></div>
  </div>

  <!-- ACTIONS -->
  <div class="card">
    <h2>Actions</h2>
    <div class="actions">
      <button class="btn" onclick="runDiagnose()">🩺 Diagnose</button>
      <button class="btn" onclick="runAutoHeal()">🩹 Auto-heal All</button>
      <button class="btn" onclick="openLogs()">📂 Logs</button>
      <button class="btn danger" onclick="confirmShutdown()">⏸ Shut Down All</button>
    </div>
  </div>

  <footer>
    Cloud-only · Auto-refresh every 5s
  </footer>
</div>
<div class="toast" id="toast"></div>

<!-- Strategy editor modal -->
<div class="modal-backdrop" id="strategy-modal">
  <div class="modal">
    <h3 id="modal-title">New Strategy</h3>
    <label>ID (unique key)</label>
    <input id="field-id" placeholder="my-ema-cross" />
    <label>Name</label>
    <input id="field-name" placeholder="My EMA Cross" />
    <label>Description</label>
    <textarea id="field-desc" placeholder="What this strategy does"></textarea>
    <label>Timeframe</label>
    <select id="field-tf">
      <option value="15">15m</option>
      <option value="30">30m</option>
      <option value="60">1h</option>
      <option value="240">4h</option>
    </select>
    <label>Direction</label>
    <select id="field-direction">
      <option value="auto">Auto (long & short)</option>
      <option value="long">Long only</option>
      <option value="short">Short only</option>
    </select>
    <label>Entry trigger</label>
    <select id="field-entry">
      <option value="ema_cross">EMA cross (fast crosses slow)</option>
      <option value="ema_pullback">EMA pullback (close touches slow EMA + rejection)</option>
      <option value="bb_extreme">Bollinger Band extreme (wick beyond ±2σ)</option>
      <option value="rsi_bounds">RSI oversold/overbought reversal</option>
    </select>
    <div style="display:flex; gap:8px">
      <div style="flex:1"><label>Fast EMA</label><input id="field-fast" type="number" value="9" /></div>
      <div style="flex:1"><label>Slow EMA</label><input id="field-slow" type="number" value="21" /></div>
    </div>
    <div style="display:flex; gap:8px">
      <div style="flex:1"><label>RSI min (long gate)</label><input id="field-rsi-min" type="number" value="0" min="0" max="100" /></div>
      <div style="flex:1"><label>RSI max (short gate)</label><input id="field-rsi-max" type="number" value="100" min="0" max="100" /></div>
    </div>
    <div style="display:flex; gap:8px">
      <div style="flex:1"><label>Stop = N × ATR</label><input id="field-stop" type="number" step="0.1" value="1.5" /></div>
      <div style="flex:1"><label>TP = N × R</label><input id="field-tp" type="number" step="0.1" value="2" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeStrategyEditor()">Cancel</button>
      <button class="btn" onclick="saveStrategy()">Save</button>
    </div>
  </div>
</div>

<script>
// Strategy list is loaded live from /api/strategies (auto-discovered from
// the registry). Populated once at startup before the first render.
let STRATEGY_GROUPS = [];
let STRATEGY_META = [];

async function loadStrategyList() {
  try {
    const r = await fetch('/api/strategies', { cache: 'no-store' });
    const data = await r.json();
    const all = data.strategies || [];
    const builtins = all.filter((s) => s.kind === 'builtin');
    STRATEGY_GROUPS = [{
      folder: `Strategies (${builtins.length})`,
      items: builtins.map((s) => ({
        key: s.id, num: '#' + s.num, name: s.name,
        desc: s.concept || '', hasPlaybook: s.hasPlaybook,
      })),
    }];
    STRATEGY_META = STRATEGY_GROUPS.flatMap((g) => g.items);
  } catch (err) {
    console.error('strategy list load failed', err);
  }
}

// Folder collapse state — persisted in localStorage so it survives reloads.
const COLLAPSE_STATE_KEY = 'octave_folder_collapse';
function loadCollapseState() {
  try { return JSON.parse(localStorage.getItem(COLLAPSE_STATE_KEY)) || {}; }
  catch { return {}; }
}
function saveCollapseState(state) {
  try { localStorage.setItem(COLLAPSE_STATE_KEY, JSON.stringify(state)); }
  catch {}
}

const MODE_DESC = {
  auto:  'Cloud is primary when alive; local takes over on Mac when cloud is stale (recommended).',
  cloud: 'Only cloud sends Telegram. Local stays silent (still draws on TradingView).',
  local: 'Only local sends Telegram. Cloud tick exits early. Mac must stay on.',
};

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

async function fetchState() {
  try {
    const r = await fetch('/api/state', { cache: 'no-store' });
    const s = await r.json();
    renderState(s);
  } catch (e) {
    console.error('fetch state failed', e);
  }
}

async function postConfig(payload) {
  const r = await fetch('/api/config', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!r.ok) throw new Error('save failed');
  return r.json();
}

// Eval accounts — paper-trader balance/profit/DD/open trades per account.
// Fetches /api/positions and renders compact cards. Failures are silent so
// the rest of the dashboard keeps working.
async function renderAccounts() {
  const root = document.getElementById('accounts');
  if (!root) return;
  try {
    const r = await fetch('/api/positions');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const fmt = (n) => '$' + Math.round(n).toLocaleString('en-US');
    const fmtSigned = (n) => (n >= 0 ? '+' : '') + fmt(n).replace('$', n >= 0 ? '$' : '-$').replace('-$-', '-$');
    const html = Object.keys(data.accounts || {}).map((id) => {
      const a = data.accounts[id] || {};
      const profit = (a.balance || 0) - 50000;
      const peak = a.peakEod || 50000;
      const dd = peak - (a.balance || 0);
      const ddPct = Math.min(100, (dd / 2000) * 100);
      const open = a.openTrades || [];
      const profitColor = profit >= 0 ? 'var(--accent)' : '#e85a71';
      const dayColor = (a.dailyPnl || 0) >= 0 ? 'var(--accent)' : '#e85a71';
      const modeBadge = a.mode === 'live'
        ? '<span style="background:#4cc38a;color:#000;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;">LIVE</span>'
        : '<span style="background:rgba(240,185,65,0.2);color:#f0b941;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;">PAPER</span>';
      return `
        <div style="background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
            <div style="font-size:14px;font-weight:600;letter-spacing:0.04em;">${id.toUpperCase()}</div>
            <div>${modeBadge} <span style="color:var(--text-dim);font-size:11px;margin-left:6px;">${a.phase || 'eval'}</span></div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:12px;margin-bottom:6px;">
            <div><div style="color:var(--text-dim);font-size:10px;text-transform:uppercase;">Balance</div><div style="font-weight:600;font-size:14px;">${fmt(a.balance || 0)}</div></div>
            <div><div style="color:var(--text-dim);font-size:10px;text-transform:uppercase;">Profit</div><div style="font-weight:600;font-size:14px;color:${profitColor};">${fmtSigned(profit)}</div></div>
            <div><div style="color:var(--text-dim);font-size:10px;text-transform:uppercase;">Today</div><div style="font-weight:600;font-size:14px;color:${dayColor};">${fmtSigned(a.dailyPnl || 0)}</div></div>
            <div><div style="color:var(--text-dim);font-size:10px;text-transform:uppercase;">Open</div><div style="font-weight:600;font-size:14px;">${open.length}</div></div>
          </div>
          <div style="margin-top:8px;">
            <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;margin-bottom:3px;">DD used: ${fmt(dd)} / $2000</div>
            <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
              <div style="height:100%;width:${ddPct}%;background:${ddPct > 75 ? '#e85a71' : ddPct > 50 ? '#f0b941' : '#4cc38a'};transition:width 0.3s;"></div>
            </div>
          </div>
        </div>`;
    }).join('');
    root.innerHTML = html;
  } catch (err) {
    root.innerHTML = '<div style="color:var(--text-dim);font-size:12px;">Account state unavailable</div>';
  }
}

function fmtAge(ms) {
  if (!ms || ms < 0) return '—';
  const s = Math.round(ms / 1000);
  if (s < 60) return s + 's ago';
  const m = Math.round(s / 60);
  if (m < 60) return m + 'm ago';
  return Math.round(m / 60) + 'h ago';
}

function renderState(s) {
  // Headline: "Octave is live and watching" or muted state
  const enabledCount = Object.values(s.config?.strategies || {}).filter(Boolean).length;
  const muteSec = s.config?.mute?.untilMs && s.config.mute.untilMs > s.now_ms
    ? Math.round((s.config.mute.untilMs - s.now_ms) / 1000) : 0;
  const signalPid = s.service?.pid;
  const headlineEl = document.getElementById('headline');
  const subEl = document.getElementById('sub-headline');
  if (muteSec > 0) {
    headlineEl.innerHTML = `🔕 Muted for ${Math.round(muteSec / 60)}m`;
  } else if (signalPid) {
    headlineEl.innerHTML = `🟢 Octave is live and watching`;
  } else {
    headlineEl.innerHTML = `🔴 Signal engine is offline`;
  }
  // Count total strategies = built-in + any user-defined ones (from state)
  const totalBuiltIn = STRATEGY_META.length;
  const userStrategies = s.user_strategies || [];
  const totalStrategies = totalBuiltIn + userStrategies.length;
  subEl.textContent = `${enabledCount}/${totalStrategies} strategies enabled`;

  // Session
  document.getElementById('session-status').textContent =
    (s.activity.current_session || 'closed').toUpperCase().replace('_', ' ');

  // Last alert
  const la = s.activity.last_alert;
  if (la) {
    const lat = new Date(la.ts).getTime();
    document.getElementById('last-alert').innerHTML =
      `${la.strategy} <span style="color:var(--text-dim)">${la.status}</span> · ${fmtAge(s.now_ms - lat)}`;
  } else {
    document.getElementById('last-alert').textContent = 'None yet';
  }

  // Per-instrument prices — derived from the per-instrument heartbeat slot
  // (server now writes one anchor entry per instrument). Falls back to the
  // single legacy anchor for backward compat.
  const prices = s.cloud?.raw?.instrumentPrices || {};
  const legacyPx = s.cloud?.raw?.anchor?.close;
  const setPx = (id, key) => {
    const v = prices[key]?.close ?? (key === 'gold' ? legacyPx : null);
    document.getElementById(id).textContent = v ? `$${Number(v).toFixed(2)}` : '—';
  };
  setPx('gold-price', 'gold');
  setPx('nasdaq-price', 'nasdaq');
  setPx('sp-price', 'sp');

  // Active setups: prefer the live follow-up tracker count (bot uses same source)
  // and fall back to drawings.json for old systems that don't expose it.
  const activeCount = (typeof s.activity.active_setups === 'number'
    ? s.activity.active_setups
    : (s.activity.tracked_setups || 0));
  document.getElementById('active-setups').textContent = String(activeCount);

  // ── Eval accounts (fetched separately so failure doesn't kill the page) ──
  renderAccounts();

  // ── Strategies in folders ──
  const container = document.getElementById('strategies');
  const enabledMap = s.config?.strategies || {};
  const collapse = loadCollapseState();

  // Compose the displayed folder list = built-in + user (if any)
  const displayGroups = [...STRATEGY_GROUPS];
  if (userStrategies.length > 0 || s.allow_user_strategies) {
    displayGroups.push({
      folder: 'My Strategies',
      isUser: true,
      items: userStrategies.map((u) => ({
        key: u.id, num: '#U', name: u.name,
        desc: u.description || u.summary || 'Custom strategy',
        custom: true,
      })),
    });
  }

  // Rerender from scratch any time the count of items changes (cheap; <50 rows)
  const fingerprint = displayGroups.map((g) => `${g.folder}:${g.items.length}`).join('|');
  if (container.dataset.fingerprint !== fingerprint) {
    container.innerHTML = displayGroups.map((g) => {
      const onCount = g.items.filter((m) => !!enabledMap[m.key]).length;
      const isCollapsed = collapse[g.folder] === true;
      const rows = g.items.length === 0
        ? `<div class="strategy" style="opacity:0.6"><div class="info"><div class="desc">_(empty — add one below)_</div></div></div>`
        : g.items.map((m) => `
          <div class="strategy">
            <div class="info">
              <div><span class="num">${m.num}</span><span class="name">${m.name}</span></div>
              <div class="desc">${m.desc}</div>
            </div>
            <div class="strategy-row-actions">
              ${m.hasPlaybook ? `<a class="icon-btn" href="/api/playbook/${m.key}" target="_blank">PDF</a>` : ''}
              ${m.custom ? `<button class="icon-btn danger" data-delete-strategy="${m.key}">del</button>` : ''}
            </div>
            <div class="toggle" data-strategy="${m.key}" role="switch"></div>
          </div>`).join('');
      const newBtn = g.isUser
        ? `<div class="strategy" style="justify-content:center; gap:8px">
             <button class="icon-btn" id="upload-strategy">📎 Add strategy — upload file → AI extracts it</button>
             <input type="file" id="upload-strategy-input" multiple
               accept=".pdf,.txt,.md,.png,.jpg,.jpeg,.webp,.gif,.mp4,.mov,.js,.py,.json"
               style="display:none" />
           </div>`
        : '';
      return `
        <div class="folder ${isCollapsed ? 'collapsed' : ''}" data-folder="${g.folder}">
          <div class="folder-header" data-toggle-folder="${g.folder}">
            <div>
              <div class="folder-title">📁 ${g.folder}</div>
              <div class="folder-meta">${onCount}/${g.items.length} enabled</div>
            </div>
            <div class="folder-caret">▾</div>
          </div>
          <div class="folder-body">
            ${rows}
            ${newBtn}
          </div>
        </div>`;
    }).join('');
    container.dataset.fingerprint = fingerprint;
  } else {
    // Just refresh enabled counts in the headers
    for (const folderEl of container.querySelectorAll('.folder')) {
      const folderName = folderEl.dataset.folder;
      const group = displayGroups.find((g) => g.folder === folderName);
      if (!group) continue;
      const onCount = group.items.filter((m) => !!enabledMap[m.key]).length;
      const meta = folderEl.querySelector('.folder-meta');
      if (meta) meta.textContent = `${onCount}/${group.items.length} enabled`;
    }
  }

  // Sync toggle visual state
  for (const t of container.querySelectorAll('.toggle')) {
    if (t.classList.contains('saving')) continue;
    const enabled = !!enabledMap[t.dataset.strategy];
    t.classList.toggle('on', enabled);
  }
}

document.addEventListener('click', async (e) => {
  // Folder collapse toggle
  const fh = e.target.closest('[data-toggle-folder]');
  if (fh) {
    const name = fh.dataset.toggleFolder;
    const folderEl = fh.closest('.folder');
    folderEl.classList.toggle('collapsed');
    const collapse = loadCollapseState();
    collapse[name] = folderEl.classList.contains('collapsed');
    saveCollapseState(collapse);
    return;
  }

  // New strategy
  if (e.target.id === 'new-user-strategy') {
    openStrategyEditor(null);
    return;
  }
  // Upload file → AI extract
  if (e.target.id === 'upload-strategy') {
    document.getElementById('upload-strategy-input').click();
    return;
  }
  // Edit strategy
  const editBtn = e.target.closest('[data-edit-strategy]');
  if (editBtn) {
    openStrategyEditor(editBtn.dataset.editStrategy);
    return;
  }
  // Delete strategy
  const delBtn = e.target.closest('[data-delete-strategy]');
  if (delBtn) {
    if (!confirm(`Delete strategy "${delBtn.dataset.deleteStrategy}"?`)) return;
    try {
      const r = await fetch(`/api/user-strategies/${encodeURIComponent(delBtn.dataset.deleteStrategy)}`, { method: 'DELETE' });
      if (!r.ok) throw new Error(await r.text());
      toast('🗑 Deleted');
      delete document.getElementById('strategies').dataset.fingerprint; // force rerender
      fetchState();
    } catch (err) { toast('✗ Delete failed: ' + err.message); }
    return;
  }

  // Strategy enable/disable toggle
  const t = e.target.closest('.toggle[data-strategy]');
  if (t) {
    if (t.classList.contains('saving')) return;
    const key = t.dataset.strategy;
    const next = !t.classList.contains('on');
    t.classList.add('saving');
    t.classList.toggle('on', next);
    try {
      await postConfig({ strategies: { [key]: next } });
      toast(`✓ ${key} → ${next ? 'ON' : 'OFF'}`);
    } catch (e) {
      t.classList.toggle('on', !next); // revert
      toast('✗ Save failed');
    } finally {
      t.classList.remove('saving');
    }
  }
});

// File upload listener (delegated since the input is re-rendered with the folder)
document.addEventListener('change', async (e) => {
  if (e.target?.id !== 'upload-strategy-input') return;
  const files = [...(e.target.files || [])];
  if (files.length === 0) return;
  toast(`📎 Uploading ${files.length} file(s) for AI extraction…`);
  const fd = new FormData();
  for (const f of files) fd.append('files', f, f.name);
  try {
    const r = await fetch('/api/user-strategies/upload', { method: 'POST', body: fd });
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    const ok = data.results.filter((x) => x.ok).length;
    const failed = data.results.filter((x) => !x.ok);
    if (ok > 0) toast(`✅ Created ${ok} strategy${ok > 1 ? 'ies' : ''} from upload`);
    for (const f of failed) toast(`✗ ${f.filename}: ${f.error}`);
    delete document.getElementById('strategies').dataset.fingerprint;
    fetchState();
  } catch (err) {
    toast('✗ Upload failed: ' + err.message);
  } finally {
    e.target.value = '';
  }
});

async function openLogs() {
  try {
    await fetch('/api/open-logs', { method: 'POST' });
    toast('📂 Opening logs in Finder');
  } catch (e) {
    toast('✗ Could not open logs');
  }
}

// ── Custom strategy editor ──
// User-editable strategies are JSON definitions stored on the VPS. The
// schema is intentionally constrained to a few proven patterns (ema_cross,
// rsi_bounds, bb_extreme) so a non-coder can wire something useful without
// risking arbitrary code execution.
let editingStrategyId = null;

async function openStrategyEditor(id) {
  editingStrategyId = id;
  let existing = { id: '', name: '', description: '', timeframe: '15',
    direction: 'auto', entry: 'ema_cross', fast: 9, slow: 21,
    rsi_min: 0, rsi_max: 100, stop_atr_mult: 1.5, tp_r: 2 };
  if (id) {
    try {
      const r = await fetch(`/api/user-strategies/${encodeURIComponent(id)}`);
      if (r.ok) existing = await r.json();
    } catch {}
  }
  // Build the modal
  document.getElementById('modal-title').textContent = id ? 'Edit Strategy' : 'New Strategy';
  document.getElementById('field-id').value = existing.id || '';
  document.getElementById('field-id').disabled = !!id;
  document.getElementById('field-name').value = existing.name || '';
  document.getElementById('field-desc').value = existing.description || '';
  document.getElementById('field-tf').value = String(existing.timeframe || '15');
  document.getElementById('field-direction').value = existing.direction || 'auto';
  document.getElementById('field-entry').value = existing.entry || 'ema_cross';
  document.getElementById('field-fast').value = existing.fast ?? 9;
  document.getElementById('field-slow').value = existing.slow ?? 21;
  document.getElementById('field-rsi-min').value = existing.rsi_min ?? 0;
  document.getElementById('field-rsi-max').value = existing.rsi_max ?? 100;
  document.getElementById('field-stop').value = existing.stop_atr_mult ?? 1.5;
  document.getElementById('field-tp').value = existing.tp_r ?? 2;
  document.getElementById('strategy-modal').classList.add('show');
}

function closeStrategyEditor() {
  document.getElementById('strategy-modal').classList.remove('show');
  editingStrategyId = null;
}

async function saveStrategy() {
  const body = {
    id: document.getElementById('field-id').value.trim(),
    name: document.getElementById('field-name').value.trim(),
    description: document.getElementById('field-desc').value.trim(),
    timeframe: document.getElementById('field-tf').value,
    direction: document.getElementById('field-direction').value,
    entry: document.getElementById('field-entry').value,
    fast: Number(document.getElementById('field-fast').value),
    slow: Number(document.getElementById('field-slow').value),
    rsi_min: Number(document.getElementById('field-rsi-min').value),
    rsi_max: Number(document.getElementById('field-rsi-max').value),
    stop_atr_mult: Number(document.getElementById('field-stop').value),
    tp_r: Number(document.getElementById('field-tp').value),
  };
  if (!body.id || !body.name) { toast('id and name are required'); return; }
  try {
    const method = editingStrategyId ? 'PUT' : 'POST';
    const path = editingStrategyId
      ? `/api/user-strategies/${encodeURIComponent(editingStrategyId)}`
      : '/api/user-strategies';
    const r = await fetch(path, {
      method, headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await r.text());
    toast(editingStrategyId ? '✓ Updated' : '✓ Created');
    closeStrategyEditor();
    delete document.getElementById('strategies').dataset.fingerprint; // force rerender
    fetchState();
  } catch (err) {
    toast('✗ Save failed: ' + (err.message || ''));
  }
}

async function runDiagnose() {
  toast('🩺 Diagnosing…');
  try {
    const r = await fetch('/api/diagnose', { cache: 'no-store' });
    const data = await r.json();
    const lines = [];
    for (const [key, entry] of Object.entries(data.report || {})) {
      lines.push(`${entry.ok ? '🟢' : '🔴'} ${key}${entry.ok ? '' : ' — ' + (entry.issues || []).join('; ')}`);
    }
    alert(lines.join('\n'));
  } catch (e) { toast('✗ Diagnose failed: ' + e.message); }
}

async function runAutoHeal() {
  if (!confirm('Run auto-heal across every service?\n\nUnhealthy services will be restarted. Healthy ones are left alone.')) return;
  toast('🩹 Healing…');
  try {
    const r = await fetch('/api/fix', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ component: 'all' }) });
    const data = await r.json();
    const lines = [];
    for (const [key, entry] of Object.entries(data.log || {})) {
      const icon = entry.wasHealthy ? '🟢' : entry.ok ? '✅' : '❌';
      lines.push(`${icon} ${key}${entry.actions?.length ? '\n   · ' + entry.actions.join('\n   · ') : ''}`);
    }
    alert(lines.join('\n'));
    fetchState();
  } catch (e) { toast('✗ Heal failed: ' + e.message); }
}

function confirmShutdown() {
  if (!confirm('Shut down Octave completely?\n\n• Trading alerts service (LaunchAgent)\n• Caffeinate (Mac can sleep again)\n• TradingView Desktop\n• Claude Code processes\n\nClick the Octave icon again to restart.')) return;
  // Trigger the same shutdown path the Octave.app launcher uses
  fetch('/api/shutdown', { method: 'POST' }).catch(() => {});
  toast('Shutdown requested…');
}

// --- Services panel ---
const SERVICE_DISPLAY = {
  'signal-engine': { name: 'Signal Engine', sub: 'Strategy evaluator · 3s loop' },
  'bot':           { name: 'Telegram Bot',   sub: 'Long-polls Telegram, runs commands' },
  'webui':         { name: 'Dashboard',     sub: 'This page · HTTP server on :7345' },
  'watchdog':      { name: 'Watchdog',      sub: 'Restarts any service that goes stale' },
  'market-data':   { name: 'Market Data',   sub: 'Yahoo / OANDA fetch cache' },
};

async function fetchServices() {
  try {
    const r = await fetch('/api/services', { cache: 'no-store' });
    const data = await r.json();
    renderServices(data.services || {});
  } catch (e) {
    console.error('fetchServices', e);
  }
}

function renderServices(services) {
  const container = document.getElementById('services');
  if (!container) return;
  const rows = [];
  for (const key of ['signal-engine', 'bot', 'webui', 'watchdog', 'market-data']) {
    const s = services[key];
    const meta = SERVICE_DISPLAY[key] || { name: key, sub: '' };
    let icon, statusText, ageText;
    if (!s || !s.beat) {
      icon = '🔴'; statusText = 'No heartbeat'; ageText = '—';
    } else if (s.alive) {
      icon = '🟢'; statusText = 'LIVE';
      ageText = `${s.age_s}s ago`;
    } else {
      icon = '🟠'; statusText = 'STALE';
      ageText = `${s.age_s}s ago (tolerance ${s.tolerance_s}s)`;
    }
    const pid = s?.beat?.pid ? `pid ${s.beat.pid}` : '';
    const mem = s?.beat?.mem_mb ? `${s.beat.mem_mb} MB` : '';
    const showRestart = key !== 'market-data'; // market-data isn't a process
    rows.push(`
      <div class="strategy" style="border-bottom:1px solid var(--border);">
        <div class="info">
          <div><span class="num">${icon}</span><span class="name">${meta.name}</span> <span style="color:var(--text-faint);font-size:12px;">${statusText}</span></div>
          <div class="desc">${meta.sub}</div>
          <div class="desc" style="color:var(--text-faint);">${ageText}${pid ? ` · ${pid}` : ''}${mem ? ` · ${mem}` : ''}</div>
        </div>
        ${showRestart ? `<button class="btn" style="flex:0 0 auto;padding:8px 14px;font-size:12px;" onclick="restartService('${key}')">🔄 Restart</button>` : ''}
      </div>
    `);
  }
  container.innerHTML = rows.join('');
}

async function restartService(key) {
  if (key === 'all' && !confirm('Restart all services? Local alerts will pause for ~5 seconds.')) return;
  toast(key === 'all' ? '🔄 Restarting all…' : `🔄 Restarting ${key}…`);
  try {
    const r = await fetch('/api/restart', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ service: key }),
    });
    const data = await r.json();
    if (data.error) toast(`✗ ${data.error}`);
    else toast(`✓ Restart kicked: ${data.restarted}`);
    setTimeout(fetchServices, 3000);
  } catch (e) { toast(`✗ ${e.message}`); }
}

async function launchTV() {
  toast('Launching TradingView…');
  try {
    await fetch('/api/launch-tv', { method: 'POST' });
  } catch (e) { toast('✗ Could not launch TV'); }
}

// Load the strategy list first so the first render has accurate folders.
loadStrategyList().then(() => {
  fetchState();
  fetchServices();
});
setInterval(fetchState, 5000);
setInterval(fetchServices, 5000);
</script>
